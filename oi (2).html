<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site HTML Simples</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #8b3a4f;
      color: white;
      padding: 20px;
      text-align: center;
    }

    section {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      color: #8b3a4f;
      margin-bottom: 15px;
    }

    p {
      line-height: 1.6;
    }

    button {
      background: #8b3a4f;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    button:hover {
      background: #6d2c3c;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>Meu Site em HTML</h1>
  <p>Site simples, funcional e pronto para usar</p>
</header>

<section>
  <h2>Sobre</h2>
  <p>
    Este é um exemplo de site feito apenas com HTML e CSS.
    Você pode abrir direto no navegador ou publicar na internet.
  </p>
  <button onclick="alert('Botão funcionando!')">Clique aqui</button>
</section>

<section>
  <h2>video.mp4</h2>
  <video width="50%" controls>
    <source src="video.mp4.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>
</section>

<footer>
  <p>© 2026 - Site HTML simples</p>
</footer>

</body>
</html>
